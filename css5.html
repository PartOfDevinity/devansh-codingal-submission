<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin:0px;
      padding:0px;
      box-sizing: border-box;
    }
    h1{
      padding:30px;
      background-color: yellow;
    }
    div{
      margin: 40px 0px;
      padding: 30px;
    }
    h3{
      transition: 2s;
    }
    h3:hover{
      transform: rotate(360deg);
    }
    #img{
      background:url("https://images.unsplash.com/photo-1593085512500-5d55148d6f0d?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8Y2FydG9vbnxlbnwwfHwwfHx8MA%3D%3D");
      background-position:center;
      margin:50px 0px;
      height: 500px;
      width: 400px;
      border-radius: 20px;
      transition: 1.3s;
    }
    #img:hover{
      background: url("https://unsplash.com/photos/a-couple-of-women-standing-next-to-each-other-J-czn98aVuk")
       box-shadow: 0px 0px 30px;
    }
    button{
      margin-top: 40px;
      width:300px;
      height: 100px;
      font-size:25px;
      color:white;
      background-color:blue;
      border-radius: 30px;
      transition: 2s;
    }
    button:hover{
    background-color: red;
    scale:1.2;
    transform: rotate(360deg)
    }
  </style>
</head>
<body>
  <center>
    <h1>Hover Playground</h1>
    <div>
      <h3>Hover On Me</h3>

      <div id="img"></div>

      <button>Hover On Me</button>
    </div>
  </center>
</body>
</html>
