<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jumpscare Demo</title>
  <style>
    body {
      text-align: center;
      background-color: black;
      color: white;
      font-family: sans-serif;
      margin-top: 100px;
    }
    #scareImg {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 1;
    }
  </style>
</head>
<body>
  <h1 id="test">Click on me</h1>
  <img id="scareImg" src="https://images.unsplash.com/photo-1779881718730-e649656ebae1?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw0fHx8ZW58MHx8fHx8">

  <script>
    addEventListener("click", function () {
      // Show scary image
      document.getElementById("scareImg").style.display = "block";

    });
  </script>
</body>
</html>
